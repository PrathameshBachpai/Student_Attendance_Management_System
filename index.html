<!DOCTYPE html>
<html>
<head>
    <title>Student Attendance</title>
</head>
<body>

<h2>Check Attendance</h2>

<input type="text" id="roll" placeholder="Enter Roll No">
<button onclick="getAttendance()">Check</button>

<h3 id="result"></h3>

<script>
function getAttendance() {
    const roll = document.getElementById("roll").value;

    fetch(`http://localhost:3000/report/${roll}`)
    .then(res => res.json())
    .then(data => {
        if (data.length > 0) {
            document.getElementById("result").innerHTML =
                "Attendance: " + data[0].percentage + "%";
        } else {
            document.getElementById("result").innerHTML =
                "No data found";
        }
    });
}
</script>

</body>
</html>
