<!DOCTYPE html>
<html>

<head>
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <div class="container">
        <h2>Student Dashboard</h2>

        <input id="roll" placeholder="Roll No">
        <button onclick="getReport()">Overall</button>
        <button onclick="getSubject()">Subject Wise</button>

        <br><br>

        <input type="date" id="date">
        <button onclick="getByDate()">Check By Date</button>

        <div class="card">
            <h3 id="overall"></h3>
        </div>

        <div class="card" id="subject"></div>

        <div class="card" id="datewise"></div>
        <canvas id="chart" width="200" height="200"></canvas>
        <script>
            const params = new URLSearchParams(window.location.search);
            document.getElementById("roll").value = params.get("roll");
        </script>
        <script src="script.js"></script>

</body>

</html>
