<!DOCTYPE html>
<html>
<head>
    <title>Teacher Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Teacher Attendance Panel</h2>

    <select id="subject">
        <option value="1">DBMS</option>
        <option value="2">Microprocessor</option>
        <option value="3">IOT</option>
        <option value="4">DM</option>

    <button onclick="submitAttendance()">Submit Attendance</button>
</div>

<script src="script.js"></script>

</body>
</html>
